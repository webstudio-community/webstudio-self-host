##
## Webstudio self-hosting static file server.
##
## Serves published Webstudio projects.
## Files are written to /var/publish/<domain>/ by the publisher service.
##
## All unrecognised requests fall through to the builder app (upstream "app:3000").
##

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  # ── Builder app upstream ───────────────────────────────────────────────────
  upstream builder {
    server app:3000;
  }

  # ── Published projects (catch-all) ────────────────────────────────────────
  # $host is used as the directory name under /var/publish/.
  # If the directory exists and has an index.html → serve it.
  # Otherwise → proxy to the builder app.
  server {
    listen 80 default_server;
    server_name _;

    root /var/publish/$host;
    index index.html;

    location / {
      # Try static files first; on miss proxy to builder
      try_files $uri $uri/ $uri.html /index.html @builder;
    }

    location @builder {
      proxy_pass         http://builder;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # Aggressive caching for hashed assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      try_files $uri @builder;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}
